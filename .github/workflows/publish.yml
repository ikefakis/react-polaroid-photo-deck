name: Publish package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'npm version target (patch, minor, major, prerelease, or an exact semver)'
        required: true
        default: 'patch'

concurrency:
  group: publish-package
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Ensure workflow runs from main
        if: github.ref_name != 'main'
        run: |
          echo "This workflow must be run from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate builds
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Version, publish, and push release
        run: |
          VERSION="$(npm version "${{ inputs.version }}" --no-git-tag-version)"
          git add package.json package-lock.json
          git commit -m "chore(release): ${VERSION}"
          git tag "${VERSION}"
          npm publish --access public --provenance
          git push origin HEAD:main
          git push origin "${VERSION}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
